<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        /* Fix Android popup and audio looping issues */
        .popup {
            z-index: 9999; /* Increased z-index from 1000 to 9999 */
            will-change: transform; /* Added will-change property for smoother animations */
            max-height: 90%; /* Added max-height handling for small screens */
            overflow-y: auto; /* Added overflow handling */
        }
        /* Safety timeout for auto-dismiss */
        setTimeout(() => {
            if(!userInteracted) {
                closePopup();
            }
        }, 5000); // 5 seconds timeout for user interaction
    </style>
</head>
<body>
    <div class="popup" data-android="true">
        <h2>Pomodoro Timer</h2>
        <p>Your timer is running!</p>
    </div>
    <script>
        // Improve audio context handling on Android
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') {
            // Handle suspended state fallback
            audioContext.resume();
        }
        let userInteracted = false;
        document.querySelector('.popup').addEventListener('click', () => { userInteracted = true; });
    </script>
</body>
</html>
